<!DOCTYPE html>
<html lang="sv,en,es,fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Luxury - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f8; }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div class="flex h-screen bg-gray-50">
        <aside class="w-64 bg-indigo-950 text-white flex flex-col justify-between">
            <div>
                <div class="h-20 flex items-center px-8 border-b border-indigo-800/50">
                    <span class="text-xl font-bold tracking-wider text-white">Laser Luxury</span>
                </div>
                <nav class="mt-8 px-4 space-y-1">
                    <a href="#" class="flex items-center px-4 py-3 text-sm font-medium rounded-lg bg-indigo-900 text-white">
                        <span class="ml-3">Dashboard</span>
                    </a>
                    <a href="#" class="flex items-center px-4 py-3 text-sm font-medium rounded-lg text-indigo-200 hover:bg-indigo-900/40">
                        <span class="ml-3">Salonger / Företag</span>
                    </a>
                    <a href="#" class="flex items-center px-4 py-3 text-sm font-medium rounded-lg text-indigo-200 hover:bg-indigo-900/40">
                        <span class="ml-3">Inställningar</span>
                    </a>
                </nav>
            </div>
            <div class="p-6 border-t border-indigo-800/50 text-xs text-indigo-300">Inloggad som administratör</div>
        </aside>

        <div class="flex-1 flex flex-col overflow-y-auto">
            <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-10">
                <h1 class="text-2xl font-semibold text-gray-900">Översikt</h1>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">Admin</span>
                    <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center font-semibold text-indigo-700">A</div>
                </div>
            </header>

            <main class="p-10">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div class="bg-white rounded-2xl p-6 border border-gray-200 shadow-sm">
                        <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider">Anslutna Salonger</h3>
                        <p class="mt-4 text-4xl font-extrabold text-gray-900">12</p>
                    </div>
                    <div class="bg-white rounded-2xl p-6 border border-gray-200 shadow-sm">
                        <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider">Aktiva Konversationer</h3>
                        <p class="mt-4 text-4xl font-extrabold text-gray-900">48</p>
                    </div>
                    <div class="bg-white rounded-2xl p-6 border border-gray-200 shadow-sm">
                        <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider">Bokade Tider (Denna månad)</h3>
                        <p class="mt-4 text-4xl font-extrabold text-gray-900">184</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 max-w-3xl">
                    <h2 class="text-xl font-bold text-gray-900 mb-6">Uppdatera Företagskonfiguration</h2>
                    
                    <form class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Företags-ID (Business ID)</label>
                            <input type="text" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="t.ex. salong_stockholm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Telegram Bot Token</label>
                            <input type="text" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="123456789:ABCdef...">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Google Calendar ID</label>
                            <input type="text" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="mail@group.calendar.google.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700"> Anpassad System Prompt</label>
                            <textarea rows="6" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Du är en receptionist för..."></textarea>
                        </div>
                        <div class="flex justify-end pt-2">
                            <button type="submit" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-indigo-700 shadow-sm transition">Spara konfiguration</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

</body>
</html>
